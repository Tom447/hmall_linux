server:
  port: 8082
spring:
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8090
      http-method-specify: true
      datasource:
        ds2: #配置文件的数据源名称
          nacos:
            server-addr: 192.168.10.100:8848/:8848
            data-id: degrade.json
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: degrade
hm:
  db:
    database: hm-cart
  swagger:
    title: 购物车文档
    package: com.hmall.cart.controller
feign:
  sentinel:
    enabled: true #开启线程隔离
